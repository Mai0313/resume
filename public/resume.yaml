        description: Software Engineer at Google Pixel Security Team, specializing in ARM Trusted Firmware (TF-A), Rust-based Firmware (RF-A), and Baremetal Test Frameworks (TFTF) for next-generation Pixel SoCs.
        summary: >
          Driving software-led silicon development for Google Pixel SoCs. Focused on pre-silicon validation, firmware stability, and system-level power management (LPM), bridging the gap between hardware bringup and OS deployment.
        highlights:
          - Expanded Baremetal Test Framework (TFTF) coverage in pre-silicon environments, decoupling firmware testing from OS readiness and accelerating low-power mode (LPM) development by 4 to 8 weeks.
          - Developed and optimized ARM Trusted Firmware (TF-A) and Rust-based Firmware (RF-A), introducing mechanisms like deterministic sleep algorithms and exponential backoff to eliminate SMC storms and timer race conditions.
          - Investigated and resolved complex system-level stability issues, including AXI bus deadlocks, power-down failures, and APC watchdog timeouts.
          - Implemented and validated critical firmware workarounds for hardware errata (e.g., Double CMO for early write acknowledgement flaws) across varying core architectures to prevent memory corruption.
          - Facilitated the bringup of next-generation SoC architectures (e.g., P26, CDO) utilizing a dual-track development strategy in TF-A and RF-A to ensure project security and delivery timelines.

      - company: MediaTek
        position: Machine Learning Engineer
        location: Hsinchu, Taiwan
        start_date: 2022-08
        end_date: 2025-10
        url: https://www.mediatek.com
        description: Fabless semiconductor company that designs and manufactures a range of semiconductor products, providing chips for wireless communications, high-definition television, handheld mobile devices like smartphones and tablet computers, navigation systems, consumer multimedia products and digital subscriber line services as well as optical disc drives.
        summary: >
          Spearheaded ML research and industrialization for semiconductor design—thermal simulation, leakage analysis, and multi-agent AI systems.
        highlights:
          - Developed and deployed physics-aware deep learning models for SoC thermal simulation, reducing maximum temperature prediction error by 34%.
          - Engineered layout-dependent leakage analysis methodology, enhancing pre-silicon estimation accuracy by 10% across multiple product lines.
          - Built scalable data analysis and visualization pipelines for IC design, improving decision-making speed and accuracy.
          - Led automation of RF/analog circuit design using multi-agent LLM systems, driving Pass@1 success rate to over 84% on complex tasks.
          - Published 3 peer-reviewed papers in top conferences (NeurIPS, IEEE VLSI TSA, IEEE ICLAD) as first/co-author.
          - Established industry-academia partnerships and secured research sponsorships, supporting talent development and knowledge exchange.
          - Mentored junior engineers and interns, fostering open collaboration and a culture of continuous learning.

